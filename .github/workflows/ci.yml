name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    name: rust (${{ matrix.host }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: linux-x86_64
            os: ubuntu-24.04
          - host: linux-aarch64
            os: ubuntu-24.04-arm
          - host: macos-x86_64
            os: macos-13
          - host: macos-aarch64
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --all-targets --all-features -- -W clippy::missing_docs_in_private_items
      - run: cargo test --workspace --all-features
      - run: cargo test -p jcim-api --test descriptor_contract
      - run: cargo test -p jcim-app --test characterization -- --test-threads=1
      - run: cargo test -p jcim-cli --test docs_smoke -- --test-threads=1
      - run: cargo test -p jcim-cli --test json_contract -- --test-threads=1
      - run: cargo test -p jcim-sdk --test lifecycle -- --test-threads=1
      - run: cargo test -p jcimd --test runtime_cleanup -- --test-threads=1
      - run: cargo test -p jcim-sdk --test docs_examples
      - run: cargo test --workspace --doc
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --document-private-items

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p jcim-config --test third_party_governance
      - run: cargo install --locked cargo-audit cargo-deny
      - run: cargo audit
      - run: cargo deny check
